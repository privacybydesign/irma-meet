services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: base
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor  # keep vendor inside container
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # The app authenticates to the IRMA server with this token; it must match
      # the token the irma-init service writes into the server config.
      IRMA_API_TOKEN: ${IRMA_API_TOKEN:?set IRMA_API_TOKEN in your .env}
      IRMA_SERVER_URL: http://irma-server:8088
    depends_on:
      db:
        condition: service_healthy
    networks:
      - irma-meet

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - irma-meet

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: irmameet
      MYSQL_USER: irmameet
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "irmameet", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - irma-meet

  # Generates a fresh JWT signing key (never committed) and writes the IRMA
  # server config with requestor token auth enabled, using IRMA_API_TOKEN from
  # the environment. Runs once before irma-server and exits.
  irma-init:
    image: alpine:3.20
    environment:
      IRMA_API_TOKEN: ${IRMA_API_TOKEN:?set IRMA_API_TOKEN in your .env}
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache openssl >/dev/null
        if [ ! -f /etc/irma/jwt_privkey.pem ]; then
          openssl genrsa -out /etc/irma/jwt_privkey.pem 2048
        fi
        cat > /etc/irma/config.json <<EOF
        {
          "url": "http://localhost:8088",
          "jwt_privkey_file": "/etc/irma/jwt_privkey.pem",
          "no_auth": false,
          "requestors": {
            "irma-meet": { "auth_method": "token", "key": "$IRMA_API_TOKEN" }
          }
        }
        EOF
    volumes:
      - irma_config:/etc/irma
    networks:
      - irma-meet

  irma-server:
    image: ghcr.io/privacybydesign/irma:latest
    command: server -v --config /etc/irma/config.json
    ports:
      - "8088:8088"
    depends_on:
      irma-init:
        condition: service_completed_successfully
    volumes:
      - irma_config:/etc/irma:ro
    networks:
      - irma-meet

  mail:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - irma-meet

volumes:
  db_data:
  irma_config:

networks:
  irma-meet:
