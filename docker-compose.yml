services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: base
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor  # keep vendor inside container
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - irma-meet

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - irma-meet

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: irmameet
      POSTGRES_USER: irmameet
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      # psql round-trip, not pg_isready: ensures the irmameet role and
      # database are actually initialised before app/migrations boot.
      test: ["CMD-SHELL", "psql -U irmameet -d irmameet -c 'select 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - irma-meet

  irma-server:
    image: ghcr.io/privacybydesign/irma:latest
    command: server --no-auth -v --url http://localhost:8088 --jwt-privkey-file /etc/irma/jwt_privkey.pem
    ports:
      - "8088:8088"
    volumes:
      - ./docker/irma/jwt_privkey.pem:/etc/irma/jwt_privkey.pem:ro
    networks:
      - irma-meet

  mail:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - irma-meet

volumes:
  pg_data:

networks:
  irma-meet:
